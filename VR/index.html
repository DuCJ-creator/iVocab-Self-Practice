<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 智能線上測驗系統</title>
<style>
:root {
  --bg: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
  --glass: rgba(255,255,255,0.05);
  --glass-b: rgba(255,255,255,0.1);
  --accent: #818cf8;
  --accent2: #a5b4fc;
  --text: #f1f5f9;
  --muted: #94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;user-select:none;}
body{background:var(--bg);min-height:100vh;color:var(--text);overflow-x:hidden;display:flex;flex-direction:column;}

header{padding:16px 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(15,23,42,0.5);backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-b);position:sticky;top:0;z-index:10;}
.logo{display:flex;align-items:center;gap:10px;font-size:1.05rem;font-weight:700;background:linear-gradient(45deg,#a5b4fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.btn-back{display:none;align-items:center;gap:6px;padding:8px 18px;background:var(--glass);border:1px solid var(--glass-b);border-radius:30px;color:var(--text);cursor:pointer;backdrop-filter:blur(10px);transition:all 0.3s;font-size:0.9rem;}
.btn-back:hover{background:rgba(255,255,255,0.15);transform:translateX(-3px);}

main{flex:1;padding:32px 20px;max-width:1400px;width:100%;margin:0 auto;}
.page-title{font-size:2rem;margin-bottom:12px;font-weight:300;text-align:center;letter-spacing:1px;}
.page-title strong{font-weight:700;color:var(--accent);text-shadow:0 0 20px rgba(129,140,248,0.4);}

.stats-bar{display:flex;justify-content:center;gap:20px;margin-bottom:32px;flex-wrap:wrap;}
.stat-pill{background:rgba(255,255,255,0.07);border:1px solid var(--glass-b);border-radius:20px;padding:7px 18px;font-size:0.82rem;display:flex;align-items:center;gap:7px;}
.stat-pill .num{font-weight:700;font-size:0.95rem;color:var(--accent2);}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;}
.card{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-b);border-radius:24px;padding:32px 24px;text-align:center;cursor:pointer;transition:all 0.4s cubic-bezier(0.165,0.84,0.44,1);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(to right,transparent,rgba(255,255,255,0.07),transparent);transform:skewX(-25deg);transition:0.75s;}
.card:hover::before{left:150%;}
.card:hover{transform:translateY(-6px);background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.25);box-shadow:0 20px 40px rgba(129,140,248,0.12);}
.card-icon{font-size:2.8rem;margin-bottom:14px;display:block;transition:transform 0.3s;}
.card:hover .card-icon{transform:scale(1.1) rotate(-3deg);}
.card-title{font-size:1.4rem;font-weight:700;margin-bottom:8px;}
.card-sub{font-size:0.85rem;color:var(--muted);}
.card-badge{position:absolute;top:14px;right:14px;background:rgba(129,140,248,0.2);border:1px solid rgba(129,140,248,0.4);border-radius:12px;padding:3px 10px;font-size:0.72rem;font-weight:700;color:var(--accent2);}
.card-done{position:absolute;bottom:14px;right:16px;font-size:0.78rem;color:var(--muted);}
.card-locked{cursor:default;pointer-events:none;}
.card-locked:hover{transform:none;background:var(--glass);border-color:var(--glass-b);box-shadow:none;}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,0.75);backdrop-filter:blur(14px);display:none;justify-content:center;align-items:center;z-index:100;}
.modal{background:rgba(18,16,55,0.95);border:1px solid var(--glass-b);border-radius:28px;padding:36px;width:90%;max-width:480px;box-shadow:0 25px 60px rgba(0,0,0,0.6);animation:popIn 0.25s ease-out;}
@keyframes popIn{from{opacity:0;transform:scale(0.93) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-title{font-size:1.4rem;margin-bottom:4px;font-weight:700;text-align:center;}
.modal-sub{font-size:0.82rem;color:var(--muted);text-align:center;margin-bottom:22px;}
.ver-list{display:flex;flex-direction:column;gap:10px;}

.ver-btn{padding:14px 18px;background:rgba(255,255,255,0.06);border:1px solid var(--glass-b);color:var(--text);border-radius:16px;cursor:pointer;font-size:1rem;transition:all 0.2s;display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;}
.ver-btn:hover{background:var(--accent);border-color:var(--accent2);transform:translateY(-2px);}
.ver-left{display:flex;align-items:center;gap:10px;text-align:left;}
.ver-emoji{font-size:1.3rem;flex-shrink:0;}
.ver-name{font-weight:600;font-size:0.95rem;display:block;}
.ver-desc{font-size:0.75rem;color:rgba(255,255,255,0.55);display:block;margin-top:1px;}
.ver-btn:hover .ver-desc{color:rgba(255,255,255,0.8);}
.ver-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* Score badges */
.sbadge{border-radius:20px;padding:4px 11px;font-size:0.78rem;font-weight:700;white-space:nowrap;}
.sbadge-empty{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.28);}
.sbadge-basic{background:rgba(250,204,21,0.18);color:#fcd34d;border:1px solid rgba(250,204,21,0.3);}
.sbadge-essential{background:rgba(56,189,248,0.15);color:#7dd3fc;border:1px solid rgba(56,189,248,0.3);}
.sbadge-advanced{background:rgba(167,139,250,0.18);color:#c4b5fd;border:1px solid rgba(167,139,250,0.3);}
.arr{font-size:1rem;opacity:0.5;}
.ver-btn:hover .arr{opacity:1;}

/* Iframe viewer */
.iframe-wrap{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0f172a;z-index:200;flex-direction:column;}
.iframe-bar{height:58px;background:#1e293b;display:flex;align-items:center;padding:0 20px;justify-content:space-between;border-bottom:1px solid #334155;gap:12px;}
.iframe-bar-title{font-weight:700;font-size:0.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn-close{background:#ef4444;color:white;border:none;padding:8px 18px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:0.88rem;font-weight:700;flex-shrink:0;}
iframe{width:100%;flex:1;border:none;background:#fff;}

/* Toast */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(30,27,75,0.95);border:1px solid var(--glass-b);border-radius:16px;padding:12px 24px;font-size:0.9rem;font-weight:600;z-index:9999;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),opacity 0.4s;opacity:0;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>
<header>
  <div class="logo">✨ Shirley's iVocab V/R Online QUIZ PORTAL</div>
  <button class="btn-back" id="btnBack" onclick="goBack()">← 返回關卡</button>
</header>
<main>
  <h2 class="page-title" id="pageTitle">請選擇 Select <strong>Level 關卡</strong></h2>
  <div class="stats-bar" id="statsBar"></div>
  <div class="grid" id="mainGrid"></div>
</main>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 class="modal-title" id="modalTitle">選擇版本</h3>
    <p class="modal-sub" id="modalSub">選擇難易度開始測驗</p>
    <div class="ver-list" id="verList"></div>
  </div>
</div>

<div class="iframe-wrap" id="iframeWrap">
  <div class="iframe-bar">
    <span class="iframe-bar-title" id="iframeTitle">載入中...</span>
    <button class="btn-close" onclick="closeIframe()">✕ 關閉測驗</button>
  </div>
  <iframe id="quizFrame" src=""></iframe>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const VERSIONS = [
  {key:'basic',    emoji:'🌟', name:'BASIC 版本',     desc:'基礎詞彙 · 建立信心',   cls:'sbadge-basic'},
  {key:'essential',emoji:'💎', name:'ESSENTIAL 版本', desc:'核心必考 · 穩固基礎',   cls:'sbadge-essential'},
  {key:'advanced', emoji:'👑', name:'ADVANCED 版本',  desc:'挑戰進階 · 衝刺滿分',  cls:'sbadge-advanced'},
];
const LEVEL_EMOJIS = ['🏅','🥈','🥇','⚡','🔥','🚀'];
const UNIT_RANGES  = ["Units 1-5","Units 6-10","Units 11-15","Units 16-20","Units 21-25",
                      "Units 26-30","Units 31-35","Units 36-40","Units 41-45","Units 46-50"];

let pageState = 'LEVEL', selLevel = null, selUnitInfo = null;

// ─── Storage helpers ──────────────────────────────────────────────────────────
function lsKey(level, unit, version) {
  return `quiz_score_L${level}_${unit}_${version}`;
}
function getScore(level, unit, version) {
  try { return localStorage.getItem(lsKey(level, unit, version)); } catch(e){ return null; }
}
function saveScore(level, unit, version, got, total) {
  try {
    const k = lsKey(level, unit, version);
    const prev = localStorage.getItem(k);
    if (prev) {
      const prevGot = parseInt(prev.split('/')[0]);
      if (got <= prevGot) return; // keep best
    }
    localStorage.setItem(k, `${got}/${total}`);
  } catch(e){}
}

// ─── Unit key normalisation ───────────────────────────────────────────────────
function unitKey(range) {
  // "Units 1-5" → "u01-05", "Units 26-30" → "u26-30"
  const m = range.match(/(\d+)-(\d+)/);
  if (!m) return range.toLowerCase().replace(/\s+/g,'');
  return 'u' + m[1].padStart(2,'0') + '-' + m[2].padStart(2,'0');
}

// ─── Progress helpers ─────────────────────────────────────────────────────────
function levelProgress(level) {
  let done = 0, total = UNIT_RANGES.length * VERSIONS.length;
  UNIT_RANGES.forEach(r => VERSIONS.forEach(v => { if(getScore(level,unitKey(r),v.key)) done++; }));
  return {done, total};
}
function globalStats() {
  let done = 0, total = 6 * UNIT_RANGES.length * VERSIONS.length;
  for(let l=1;l<=6;l++) done += levelProgress(l).done;
  return {done, total};
}

// ─── Which levels have quizzes built ─────────────────────────────────────────
// Edit this array whenever a new level is ready. Locked levels show locked.
const AVAILABLE_LEVELS = [1, 2, 3, 4, 5]; // remove a number if that level isn't ready

const LEVEL_LABELS = [
  '國中基礎 Grade 7–8',
  '國中進階 Grade 8–9',
  '高中入門 Grade 10',
  '高中核心 Grade 11',
  '高中進階 Grade 12',
  '學測衝刺 GSAT Prep',
];

// ─── Stats bar ────────────────────────────────────────────────────────────────
function renderStats() {
  const bar = document.getElementById('statsBar');
  if (pageState === 'LEVEL') {
    const anyDone = AVAILABLE_LEVELS.some(l => levelProgress(l).done > 0);
    bar.innerHTML = anyDone
      ? `<div class="stat-pill">👋 歡迎回來！選擇你的 Level 繼續練習</div>`
      : `<div class="stat-pill">🎯 選擇你的年級 Level 開始第一份測驗吧！</div>`;
  } else {
    const {done, total} = levelProgress(selLevel);
    const pct = total ? Math.round(done/total*100) : 0;
    bar.innerHTML = `
      <div class="stat-pill">✅ 已完成 <span class="num">${done}</span> / ${total} 份</div>
      <div class="stat-pill">🎯 達成率 <span class="num">${pct}%</span></div>`;
  }
}

// ─── Level grid ───────────────────────────────────────────────────────────────
function initLevels() {
  pageState = 'LEVEL'; selLevel = null;
  document.getElementById('btnBack').style.display = 'none';
  document.getElementById('pageTitle').innerHTML = '請選擇 Select <strong>Level 關卡</strong>';
  const grid = document.getElementById('mainGrid');
  grid.innerHTML = '';
  for (let i=1;i<=6;i++) {
    const available = AVAILABLE_LEVELS.includes(i);
    const card = document.createElement('div');

    if (available) {
      const {done, total} = levelProgress(i);
      const started = done > 0;
      card.className = 'card';
      card.onclick = () => selectLevel(i);
      const pct = total ? Math.round(done/total*100) : 0;
      const progressBar = started
        ? `<div style="margin-top:14px;height:5px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--accent),#f472b6);border-radius:4px;transition:width 0.8s ease;"></div></div>
           <div style="display:flex;justify-content:space-between;align-items:center;margin-top:7px;">
             <span style="font-size:0.75rem;color:var(--muted);">${done}/${total} 份完成</span>
             <span style="font-size:0.85rem;font-weight:700;color:var(--accent2);">${pct}%</span>
           </div>`
        : `<div style="margin-top:14px;height:5px;background:rgba(255,255,255,0.08);border-radius:4px;"></div>
           <div style="font-size:0.75rem;color:rgba(255,255,255,0.28);margin-top:7px;">尚未開始 · 0%</div>`;
      card.innerHTML = `
        <span class="card-icon">${LEVEL_EMOJIS[i-1]}</span>
        <div class="card-title">Level ${i}</div>
        <div class="card-sub">${LEVEL_LABELS[i-1]}</div>
        ${progressBar}`;
    } else {
      card.className = 'card card-locked';
      card.innerHTML = `
        <span class="card-icon" style="filter:grayscale(1);opacity:0.4">🔒</span>
        <div class="card-title" style="opacity:0.4">Level ${i}</div>
        <div class="card-sub" style="opacity:0.35">${LEVEL_LABELS[i-1]}</div>
        <div style="margin-top:12px;font-size:0.78rem;color:rgba(255,255,255,0.25);font-style:italic;">即將開放 Coming Soon</div>`;
    }
    grid.appendChild(card);
  }
  renderStats();
}

// ─── Unit grid ────────────────────────────────────────────────────────────────
function selectLevel(level) {
  selLevel = level; pageState = 'UNITS';
  document.getElementById('btnBack').style.display = 'flex';
  document.getElementById('pageTitle').innerHTML = `Level ${level} · 選擇 <strong>Units 單元</strong>`;
  const grid = document.getElementById('mainGrid');
  grid.innerHTML = '';
  UNIT_RANGES.forEach(range => {
    const uk = unitKey(range);
    const doneV = VERSIONS.filter(v => getScore(level, uk, v.key));
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => showModal(level, uk, range);
    const badges = VERSIONS.map(v => {
      const s = getScore(level, uk, v.key);
      return s ? `<span title="${v.name}: ${s}" style="font-size:1.1rem">${v.emoji}</span>` : '';
    }).join('');
    card.innerHTML = `
      <span class="card-icon">📝</span>
      <div class="card-title">${range}</div>
      <div class="card-sub" style="margin-bottom:${doneV.length?'10px':'0'}">點擊選擇版本</div>
      ${doneV.length ? `<div style="display:flex;justify-content:center;gap:6px">${badges}</div>` : ''}
      <div class="card-badge">${doneV.length}/3</div>`;
    grid.appendChild(card);
  });
  renderStats();
}

// ─── Version modal ────────────────────────────────────────────────────────────
function showModal(level, unit, rangeName) {
  selUnitInfo = {level, unit, rangeName};
  document.getElementById('modalTitle').innerText = rangeName;
  document.getElementById('modalSub').innerText = `Level ${level} · 選擇難易度開始測驗`;
  renderModalButtons(level, unit, rangeName);
  document.getElementById('modal').style.display = 'flex';
}

function renderModalButtons(level, unit, rangeName) {
  // also persist rangeName in selUnitInfo so refreshes work
  if (rangeName && selUnitInfo) selUnitInfo.rangeName = rangeName;
  const rn = rangeName || (selUnitInfo && selUnitInfo.rangeName) || '';
  const list = document.getElementById('verList');
  list.innerHTML = '';
  VERSIONS.forEach(v => {
    const s = getScore(level, unit, v.key);
    const badgeHtml = s
      ? `<span class="sbadge ${v.cls}">${v.emoji} ${s}</span>`
      : `<span class="sbadge sbadge-empty">未完成</span>`;
    const btn = document.createElement('button');
    btn.type = 'button';   // prevent any accidental form-submit behaviour
    btn.className = 'ver-btn';
    btn.innerHTML = `
      <div class="ver-left">
        <span class="ver-emoji">${v.emoji}</span>
        <span><span class="ver-name">${v.name}</span><span class="ver-desc">${v.desc}</span></span>
      </div>
      <div class="ver-right">${badgeHtml}<span class="arr">→</span></div>`;
    btn.onclick = (e) => {
      e.preventDefault();
      e.stopPropagation();
      document.getElementById('modal').style.display = 'none';
      openQuiz(level, unit, v.key, `${rn} · ${v.name}`);
    };
    list.appendChild(btn);
  });
}

function closeModal(e) { document.getElementById('modal').style.display = 'none'; }

// ─── Open quiz in iframe ──────────────────────────────────────────────────────
function openQuiz(level, unit, version, displayName) {
  const base = window.location.origin + window.location.pathname;
  const dir  = base.substring(0, base.lastIndexOf('/'));
  const vShort = version[0]; // basic→b, essential→e, advanced→a
  const url  = `${dir}/l${level}_${unit}_${vShort}.html`;

  document.getElementById('iframeTitle').innerText = `📝 ${displayName}`;
  document.getElementById('quizFrame').src = url;
  document.getElementById('iframeWrap').style.display = 'flex';
  window._currentQuiz = {level, unit, version};

  document.getElementById('quizFrame').onload = () => {
    // Small delay to let quiz JS fully initialise
    setTimeout(() => injectScoreDetector(), 300);
  };
}

// ─── Score injection – no quiz file changes needed ────────────────────────────
function injectScoreDetector() {
  try {
    const iWin = document.getElementById('quizFrame').contentWindow;
    const iDoc = document.getElementById('quizFrame').contentDocument;
    if (!iWin || !iDoc) return;

    // Strategy 1: wrap executeSubmit (primary – works for Shirley's quiz format)
    if (typeof iWin.executeSubmit === 'function') {
      const original = iWin.executeSubmit.bind(iWin);
      iWin.executeSubmit = function() {
        original();                          // run quiz's own grading
        setTimeout(() => extractScore(iDoc), 200); // then harvest score
      };
      return; // done
    }

    // Strategy 2: MutationObserver fallback (in case executeSubmit name differs)
    const obs = new MutationObserver(() => {
      const ratioEl = iDoc.getElementById('score-ratio');
      if (ratioEl && ratioEl.textContent.match(/\d+\/\d+/)) {
        obs.disconnect();
        extractScore(iDoc);
      }
    });
    obs.observe(iDoc.body, {childList:true, subtree:true, characterData:true});

  } catch(e) {
    // Cross-origin or other error – score saving unavailable for this file
    console.warn('[Portal] Score injection skipped:', e.message);
  }
}

function extractScore(iDoc) {
  if (!window._currentQuiz) return;
  const {level, unit, version} = window._currentQuiz;

  // Primary: read the summary ratio element  e.g. "14/14 Qs"
  const ratioEl = iDoc.getElementById('score-ratio');
  if (ratioEl) {
    const m = ratioEl.textContent.match(/(\d+)\/(\d+)/);
    if (m) {
      const got = parseInt(m[1]), total = parseInt(m[2]);
      saveScore(level, unit, version, got, total);
      showToast(`✅ 成績已記錄：${got}/${total}`);
      // Refresh modal badges without closing it
      if (selUnitInfo && selUnitInfo.level === level && selUnitInfo.unit === unit) {
        renderModalButtons(level, unit, selUnitInfo.rangeName);
      }
      // Refresh unit grid cards
      refreshUnitCards();
      return;
    }
  }

  // Fallback: sum up nav counters  e.g. nav-counter-section-vocab "10/10"
  let totalGot = 0, totalMax = 0;
  iDoc.querySelectorAll('[id^="nav-counter-section-"]').forEach(el => {
    const m = el.textContent.match(/(\d+)\/(\d+)/);
    if (m) { totalGot += parseInt(m[1]); totalMax += parseInt(m[2]); }
  });
  if (totalMax > 0) {
    saveScore(level, unit, version, totalGot, totalMax);
    showToast(`✅ 成績已記錄：${totalGot}/${totalMax}`);
    if (selUnitInfo && selUnitInfo.level === level && selUnitInfo.unit === unit) {
      renderModalButtons(level, unit, selUnitInfo.rangeName);
    }
    refreshUnitCards();
  }
}

// Refresh just the badge/counter on unit cards without full redraw
function refreshUnitCards() {
  if (pageState !== 'UNITS') return;
  // Full redraw is cleanest since cards are small
  selectLevel(selLevel);
}

// ─── Close iframe ─────────────────────────────────────────────────────────────
function closeIframe() {
  document.getElementById('iframeWrap').style.display = 'none';
  document.getElementById('quizFrame').src = '';
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function goBack() { if (pageState === 'UNITS') initLevels(); }

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

window.onload = initLevels;
</script>
</body>
</html>
