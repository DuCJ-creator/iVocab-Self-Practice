<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能線上測驗系統</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            --accent-color: #818cf8;
            --accent-hover: #a5b4fc;
            --text-color: #f1f5f9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; user-select: none; }
        body { background: var(--bg-gradient); min-height: 100vh; color: var(--text-color); overflow-x: hidden; display: flex; flex-direction: column; }
        header { padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); z-index: 10; }
        .logo-area { display: flex; align-items: center; gap: 12px; font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; background: linear-gradient(45deg, #a5b4fc, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-back { display: none; align-items: center; gap: 8px; padding: 10px 20px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 30px; color: var(--text-color); cursor: pointer; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); transition: all 0.3s; font-size: 0.95rem; }
        .btn-back:hover { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.3); transform: translateX(-4px); }
        main { flex: 1; padding: 40px 20px; max-width: 1400px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; }
        .section-title { font-size: 2.2rem; margin-bottom: 40px; font-weight: 300; text-align: center; letter-spacing: 1px; }
        .section-title strong { font-weight: 700; color: var(--accent-color); text-shadow: 0 0 20px rgba(129, 140, 248, 0.4); }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; width: 100%; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 40px 30px; text-align: center; cursor: pointer; box-shadow: 0 8px 32px 0 var(--glass-shadow); transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); position: relative; overflow: hidden; }
        .glass-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.08), transparent); transform: skewX(-25deg); transition: 0.75s; }
        .glass-card:hover::before { left: 150%; }
        .glass-card:hover { transform: translateY(-8px); background: rgba(255, 255, 255, 0.09); border-color: rgba(255, 255, 255, 0.3); box-shadow: 0 20px 40px 0 rgba(129, 140, 248, 0.15); }
        .card-icon { width: 60px; height: 60px; fill: var(--accent-color); margin-bottom: 20px; transition: transform 0.3s; display: inline-block; }
        .glass-card:hover .card-icon { transform: scale(1.1); }
        .card-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; letter-spacing: 0.5px; }
        .card-subtitle { font-size: 0.9rem; color: #94a3b8; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: rgba(30, 27, 75, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 40px; width: 90%; max-width: 480px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.6); animation: modalIn 0.3s ease-out; }
        .modal-title { font-size: 1.6rem; margin-bottom: 25px; font-weight: 700; }
        .version-btn-list { display: flex; flex-direction: column; gap: 12px; }
        .btn-version { padding: 15px; background: rgba(255, 255, 255, 0.06); border: 1px solid var(--glass-border); color: var(--text-color); border-radius: 14px; cursor: pointer; font-size: 1.05rem; transition: all 0.2s; display: flex; align-items: center; justify-content: space-between; }
        .btn-version:hover { background: var(--accent-color); border-color: var(--accent-hover); transform: translateY(-2px); }
        .iframe-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 200; flex-direction: column; }
        .iframe-header { height: 65px; background: #1e293b; display: flex; align-items: center; padding: 0 24px; justify-content: space-between; border-bottom: 1px solid #334155; }
        .iframe-title { font-weight: 700; font-size: 1.1rem; }
        .btn-close-iframe { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 0.95rem; font-weight: 700; }
        iframe { width: 100%; flex: 1; border: none; background: #ffffff; }
    </style>
</head>
<body>
    <header>
        <div class="logo-area">
            <svg class="card-icon" style="width:28px; height:28px; margin:0;" viewBox="0 -960 960 960"><path d="m344-60-56-146-146-56 56-146-56-146 146-56 56-146 146 56 146-56-56 146 146 56-56 146 56 146-146 56-56 146-146-56-146 56Zm136-180q100 0 170-70t70-170q0-100-70-170t-170-70q-100 0-170 70t-70 170q0 100 70 170t170 70Zm0-80q-67 0-113.5-46.5T320-480q0-67 46.5-113.5T480-640q67 0 113.5 46.5T640-480q0 67-46.5 113.5T480-320Zm0-80q33 0 56.5-23.5T560-480q0-33-23.5-56.5T480-560q-33 0-56.5 23.5T400-480q0 33 23.5 56.5T480-400Zm0-80Z"/></svg>
            <span>Shirley's iVocab V/R Online QUIZ PORTAL</span>
        </div>
        <button class="btn-back" id="btnBack" onclick="goBack()">
            <svg style="width:18px; height:18px; fill:currentColor;" viewBox="0 -960 960 960"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h527v80H313Z"/></svg> 返回關卡
        </button>
    </header>
    <main>
        <h2 class="section-title" id="pageTitle">請選擇 Select <strong>Level 關卡</strong></h2>
        <div class="grid-container" id="mainGrid"></div>
    </main>
    <div class="modal-overlay" id="versionModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 class="modal-title" id="modalTitle">選擇考卷版本</h3>
            <div class="version-btn-list" id="versionList"></div>
        </div>
    </div>
    <div class="iframe-container" id="iframeView">
        <div class="iframe-header">
            <span class="iframe-title" id="iframeTitle">正在載入試卷...</span>
            <button class="btn-close-iframe" onclick="closeIframe()">
                <svg style="width:18px; height:18px; fill:currentColor; vertical-align:middle; margin-right:4px;" viewBox="0 -960 960 960"><path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h280v80H200Zm440-160-55-58 102-102H360v-80h327L585-622l55-58 200 200-200 200Z"/></svg>關閉測驗
            </button>
        </div>
        <iframe id="quizIframe" src=""></iframe>
    </div>

    <script>
        let currentState = 'LEVEL'; 
        let selectedLevel = null;

        // 定義您固定會產生的考卷版本（可隨時增減修改）
        const QUIZ_VERSIONS = ["basic", "essential", "advanced"];

        const medalSvg = `<svg class="card-icon" viewBox="0 -960 960 960"><path d="M480-440q-58 0-99-41t-41-99q0-58 41-99t99-41q58 0 99 41t41 99q0 58-41 99t-99 41Zm0-80q25 0 42.5-17.5T540-580q0-25-17.5-42.5T480-640q-25 0-42.5 17.5T420-580q0 25 17.5 42.5T480-520Zm-96 280-44-122-120-48 70-104q-10-25-15-51t-5-55q0-117 81.5-198.5T480-900q117 0 198.5 81.5T760-620q0 29-5 55t-15 51l70 104-120 48-44 122-166-60-166 60Zm96-142 106 38 28-78 76-30-44-66q16-20 25-44.5t9-51.5q0-83-58.5-141.5T480-820q-83 0-141.5 58.5T280-620q0 27 9 51.5t25 44.5l-44 66 76 30 28 78 106-38Zm0-338Z"/></svg>`;
        const quizSvg = `<svg class="card-icon" viewBox="0 -960 960 960"><path d="M540-520h220v-80H540v80Zm0-120h220v-80H540v80Zm0 240h140v-80H540v80ZM240-160q-33 0-56.5-23.5T160-240v-560q0-33 23.5-56.5T240-880h480q33 0 56.5 23.5T800-800v440q0 17-11.5 28.5T760-320q-17 0-28.5-11.5T720-360v-440H240v560h360q17 0 28.5 11.5T640-200q0 17-11.5 28.5T600-160H240Zm0-560v560-560Zm200 400q0-17 11.5-28.5T480-200q17 0 28.5 11.5T520-160q0 17-11.5 28.5T480-120q-17 0-28.5-11.5T440-160Zm0-120q0-17 11.5-28.5T480-320q17 0 28.5 11.5T520-280q0 17-11.5 28.5T480-240q-17 0-28.5-11.5T440-280Zm0-120q0-17 11.5-28.5T480-440q17 0 28.5 11.5T520-400q0 17-11.5 28.5T480-360q-17 0-28.5-11.5T440-400Z"/></svg>`;
        const arrowSvg = `<svg style="width:20px; height:20px; fill:currentColor;" viewBox="0 -960 960 960"><path d="M647-440H160v-80h487L423-744l57-56 320 320-320 320-57-56 224-224Z"/></svg>`;

        function initLevels() {
            currentState = 'LEVEL';
            document.getElementById('btnBack').style.display = 'none';
            document.getElementById('pageTitle').innerHTML = '請選擇 <strong>Level 關卡</strong>';
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 6; i++) {
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.onclick = () => selectLevel(i);
                card.innerHTML = `${medalSvg}<div class="card-title">Level ${i}</div><div class="card-subtitle">Units 1-50 全套測驗</div>`;
                grid.appendChild(card);
            }
        }

        function selectLevel(levelNum) {
            selectedLevel = levelNum;
            currentState = 'UNITS';
            document.getElementById('btnBack').style.display = 'flex';
            document.getElementById('pageTitle').innerHTML = `Level ${levelNum} : 請選擇Select <strong>Units 單元</strong>`;
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            const unitRanges = ["Units 1-5", "Units 6-10", "Units 11-15", "Units 16-20", "Units 21-25", "Units 26-30", "Units 31-35", "Units 36-40", "Units 41-45", "Units 46-50"];
            unitRanges.forEach((range) => {
                const folderName = range.replace(/\s+/g, '').toLowerCase(); 
                
                let formattedRange = folderName;
                if(range === "Units 1-5") formattedRange = "units01-05";
                if(range === "Units 6-10") formattedRange = "units06-10";

                const card = document.createElement('div');
                card.className = 'glass-card';
                card.onclick = () => showVersionModal(levelNum, formattedRange, range);
                card.innerHTML = `${quizSvg}<div class="card-title">${range}</div><div class="card-subtitle">選擇難易度版本Versions of Difficulty</div>`;
                grid.appendChild(card);
            });
        }

               function showVersionModal(level, unit, rangeName) {
            const modal = document.getElementById('versionModal');
            const list = document.getElementById('versionList');
            document.getElementById('modalTitle').innerText = `${rangeName} - 請選擇版本`;
            list.innerHTML = '';
            
            QUIZ_VERSIONS.forEach(version => {
                const btn = document.createElement('button');
                btn.className = 'btn-version';
                btn.innerHTML = `<span>${version.toUpperCase()} 版本</span>${arrowSvg}`; 
                
                // 回歸標準邏輯：直接抓取與 index.html 同目錄下的正確命名檔案
                const filePath = `level${level}_${unit}_${version}.html`;
                
                btn.onclick = () => {
                    modal.style.display = 'none';
                    openHtmlInIframe(filePath, `${rangeName} (${version})`);
                };
                list.appendChild(btn);
            });
            modal.style.display = 'flex';
        }

        function closeModal(e) { document.getElementById('versionModal').style.display = 'none'; }

        function openHtmlInIframe(filePath, displayName) {
            const baseUrl = window.location.origin + window.location.pathname;
            const baseDir = baseUrl.substring(0, baseUrl.lastIndexOf('/'));
            const rawUrl = `${baseDir}/${filePath}`;
            document.getElementById('iframeTitle').innerText = `線上測驗中：${displayName}`;
            document.getElementById('quizIframe').src = rawUrl;
            document.getElementById('iframeView').style.display = 'flex';
        }

        function closeIframe() {
            document.getElementById('iframeView').style.display = 'none';
            document.getElementById('quizIframe').src = ''; 
        }

        function goBack() { if (currentState === 'UNITS') initLevels(); }
        window.onload = initLevels;
    </script>
</body>
</html>
