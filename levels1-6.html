<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes"/>
<title>Shirley's Vocab Bank | 分级练习 + 星際密室挑战</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --void: #04060f;
  --space: #080d1a;
  --nebula: #0d1535;
  --nebula2: #111d42;
  --star: #e8d5a3;
  --gold: #c9a84c;
  --gold2: #f0c96e;
  --glow: #7b5ea7;
  --glow2: #a87dd1;
  --nova: #e05c8a;
  --cyan: #4ab8c8;
  --panel: rgba(255,255,255,0.04);
  --border: rgba(201,168,76,0.25);
  --border2: rgba(201,168,76,0.5);
  --text: #d4c9e8;
  --muted: #8884a0;
  --card-r: 20px;
}
*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--void);
  font-family:'Outfit',sans-serif;
  min-height:100vh;padding:24px 16px 48px;
  position:relative;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background: radial-gradient(ellipse 600px 400px at 15% 20%, rgba(123,94,167,0.18) 0%, transparent 70%),
              radial-gradient(ellipse 500px 350px at 85% 70%, rgba(74,184,200,0.12) 0%, transparent 65%),
              radial-gradient(ellipse 400px 300px at 50% 50%, rgba(224,92,138,0.08) 0%, transparent 60%);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image: radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
                    radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
                    radial-gradient(1.5px 1.5px at 40% 8%, rgba(255,255,255,0.8) 0%, transparent 100%),
                    radial-gradient(1px 1px at 55% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
                    radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
                    radial-gradient(1.5px 1.5px at 82% 22%, rgba(255,255,255,0.9) 0%, transparent 100%),
                    radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.5) 0%, transparent 100%);
}
.container{max-width:920px;margin:0 auto;position:relative;z-index:1}

/* Original Styles */
.app-header{text-align:center;padding:16px 0 28px}
.app-header h1{font-family:'Raleway',sans-serif;font-size:clamp(22px,4vw,40px);font-weight:900;color:var(--star);letter-spacing:2px;text-shadow:0 0 30px rgba(201,168,76,0.4),0 0 60px rgba(201,168,76,0.15);}
.app-header h1 span{color:var(--gold2);text-shadow:0 0 20px rgba(240,201,110,0.6);}
.monster-entrance{background:linear-gradient(135deg,rgba(123,94,167,0.2),rgba(8,13,26,0.9));border-radius:var(--card-r);margin-bottom:32px;cursor:pointer;border:1px solid var(--border2);transition:transform 0.2s,box-shadow 0.2s;}
.monster-entrance:hover{transform:translateY(-3px);box-shadow:0 0 40px rgba(123,94,167,0.35);}
.card{background:linear-gradient(160deg,rgba(17,29,66,0.95),rgba(8,13,26,0.98));border-radius:var(--card-r);border:1px solid var(--border);box-shadow:0 0 60px rgba(123,94,167,0.15);}
.card-body{padding:26px 24px 32px;}
.section{display:none;}.section.active{display:block;}
.quiz-section{display:none;}.quiz-section.active{display:block;}
.result-section{display:none;}.result-section.active{display:block;}
.step-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.step-num{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--glow),var(--glow2));color:white;font-weight:800;font-size:.9rem;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(123,94,167,0.5);}
.level-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin:4px 0 16px;}
.level-chip{padding:11px;border-radius:13px;border:1px solid var(--border);background:var(--panel);text-align:center;cursor:pointer;color:var(--text);font-weight:600;transition:all 0.15s;}
.level-chip.selected{background:linear-gradient(135deg,rgba(201,168,76,0.2),rgba(201,168,76,0.1));border-color:var(--gold2);color:var(--gold2);}
.mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
.mode-card{padding:15px;border-radius:13px;border:1px solid var(--border);background:var(--panel);cursor:pointer;}
.mode-card.active-mode{border-color:var(--glow2);background:linear-gradient(135deg,rgba(123,94,167,0.25),rgba(123,94,167,0.1));}
.quiz-shell{border:1px solid var(--border);border-radius:15px;padding:20px;background:rgba(4,6,15,0.5);}
.q-word{font-family:'Raleway',sans-serif;font-size:clamp(20px,4vw,32px);font-weight:700;color:var(--star);text-align:center;}
.options{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
.option{padding:13px;border:1px solid var(--border);border-radius:11px;background:var(--panel);cursor:pointer;font-weight:600;color:var(--text);}
.option.correct{background:rgba(59,138,110,0.25);border-color:#3b8a6e;color:#7dd4b5;}
.option.wrong{background:rgba(224,92,138,0.2);border-color:var(--nova);color:#f09ab8;}
.btn{display:inline-flex;padding:10px 18px;border-radius:11px;border:none;cursor:pointer;font-weight:700;transition:all 0.15s;}
.btn-primary{background:linear-gradient(135deg,var(--glow),var(--glow2));color:white;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted);}
.btn-amber{background:linear-gradient(135deg,var(--gold),#a87d2a);color:var(--void);}
.btn-monster{background:linear-gradient(135deg,var(--gold),#a07820);color:var(--void);padding:12px 28px;border-radius:40px;font-weight:800;}

/* Escape Room Styles */
.monster-game-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--void);z-index:1000;overflow-y:auto;padding:24px 16px 48px;
  background-image: radial-gradient(ellipse 700px 500px at 20% 30%, rgba(123,94,167,0.25) 0%, transparent 60%),
                    radial-gradient(ellipse 500px 400px at 80% 70%, rgba(74,184,200,0.18) 0%, transparent 55%);}
.escape-map{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin:24px 0;}
.pass-node{background:linear-gradient(145deg,#111d42,#0a1328);border:2px solid var(--border);border-radius:18px;padding:18px 12px;text-align:center;cursor:pointer;transition:all 0.4s;position:relative;overflow:hidden;}
.pass-node.unlocked{border-color:var(--gold2);box-shadow:0 0 25px rgba(201,168,76,0.5);}
.pass-node.completed{border-color:#4ade80;background:linear-gradient(145deg,rgba(74,222,128,0.15),#0a1328);}
.pass-node .spaceship{position:absolute;font-size:1.8rem;top:12px;right:12px;transition:all 0.8s ease;}
.pass-node.completed .spaceship{transform:translateY(-12px) scale(1.15);color:#67e8f9;animation:shipLand 1.2s ease;}
@keyframes shipLand{0%{transform:translateY(10px) scale(0.9);}100%{transform:translateY(-12px) scale(1.15);}}
</style>
</head>
<body>
<div class="container">
  <header class="app-header"><h1>Shirley's Vocab <span>Levels1-6 Practice</span></h1><p>分級練習 · 星際密室挑戰</p></header>

  <div class="monster-entrance" id="monsterEntranceBtn">
    <div class="monster-inner">
      <div class="monster-left">
        <div class="monster-icon">🛸🌌</div>
        <div class="monster-text"><h2>Intergalactic Escape Room</h2><p>One Mistake = Mission Failed</p></div>
      </div>
      <div class="monster-badge">🌠 ESCAPE ROOM MODE 🌠</div>
    </div>
  </div>

  <div class="module-title">📚 Leveled Practice Mode 分級練習模式</div>
  <div class="card"><div class="card-body">
    <!-- Step 1 -->
    <div id="step1" class="section active">
      <div class="step-head"><div class="step-num">1</div><h2>Choose Your Level</h2></div>
      <div class="level-grid" id="levelGrid">
        <div class="level-chip" data-lv="1">L1</div><div class="level-chip" data-lv="2">L2</div>
        <div class="level-chip" data-lv="3">L3</div><div class="level-chip" data-lv="4">L4</div>
        <div class="level-chip" data-lv="5">L5</div><div class="level-chip" data-lv="6">L6</div>
      </div>
      <div id="step1Next" style="display:none"><button class="btn btn-primary" id="goToUnits">Continue to Units →</button></div>
    </div>

    <!-- Other steps and quiz sections are handled in script -->
  </div></div>
</div>

<script>
// ======================= ORIGINAL PRACTICE CODE =======================
const BASE = 'https://ducj-creator.github.io/iVocab-Self-Practice/';
const loadedVocab = {};
let selectedLevel = null, selectedUnits = new Set();
let wordList = [], currentMode = '', currentIndex = 0, correctAnswers = 0, wrongAnswers = [], userAnswers = {};
let timer = null;
let flashcardIndex = 0, isFlipped = false, autoPlayTimer = null, viewCounts = {};

const $ = id => document.getElementById(id);

function speak(word){ if(!word||!('speechSynthesis' in window)) return; speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(word); u.lang='en-US'; u.rate=0.85; speechSynthesis.speak(u); }
function refTag(w){ return `[L${w.Level}-U${w.Unit}]`; }

async function loadLevel(lv){
  if(loadedVocab[lv]) return loadedVocab[lv];
  const res = await fetch(BASE+'level'+lv+'.csv');
  if(!res.ok){ alert('Cannot load Level '+lv); return []; }
  const text = await res.text();
  const rows = text.trim().split(/\r?\n/).slice(1);
  const data = rows.map(line=>{ const p = line.split(','); if(p.length<6) return null; return {Level:p[0].trim(), Unit:p[1].trim(), No:p[2].trim(), Word:p[3].trim(), POS:p[4].trim(), Meaning:p.slice(5).join(',').trim()}; }).filter(Boolean);
  loadedVocab[lv] = data; return data;
}

// Level Selection
document.querySelectorAll('.level-chip').forEach(chip=>{
  chip.onclick = () => {
    document.querySelectorAll('.level-chip').forEach(c=>c.classList.remove('selected'));
    chip.classList.add('selected');
    selectedLevel = chip.dataset.lv;
    $('step1Next').style.display = 'block';
  };
});

$('goToUnits').onclick = async () => {
  // ... (full original unit selection code)
  alert("Unit selection would go here - implement as needed");
};

// ======================= ESCAPE ROOM CODE =======================
let escapeActive = false;
let currentRoom = null;
let currentPass = 0;
let passWords = [];
let passCorrect = 0;
let escapeTimerInterval = null;
let escapeProgress = {};

async function loadProgress() {
  const saved = localStorage.getItem('escapeProgress');
  escapeProgress = saved ? JSON.parse(saved) : {};
  for (let i = 1; i <= 6; i++) if (!escapeProgress[i]) escapeProgress[i] = new Array(5).fill(false);
  if (!escapeProgress['all']) escapeProgress['all'] = new Array(8).fill(false);
}

function saveProgress(room, passIdx) {
  if (!escapeProgress[room]) escapeProgress[room] = new Array(room==='all'?8:5).fill(false);
  escapeProgress[room][passIdx] = true;
  localStorage.setItem('escapeProgress', JSON.stringify(escapeProgress));
}

async function buildEscapeBank(room) {
  let all = [];
  if (room && room !== 'all') all = await loadLevel(room);
  else for (let i = 1; i <= 6; i++) all.push(...(await loadLevel(i.toString())));
  return all.sort(() => 0.5 - Math.random());
}

function showEscapeMap(room) {
  loadProgress();
  const area = $('monsterGameDynamicArea') || document.createElement('div');
  if (!area.id) {
    document.body.innerHTML += '<div id="monsterGameDynamicArea"></div>';
  }
  const passes = escapeProgress[room];
  let html = `<div style="text-align:center;margin-bottom:24px;"><h2 style="color:var(--gold2);">🌌 NEBULA SECTOR ${room==='all' ? 'LABYRINTH' : room}</h2><div style="font-size:2.8rem;">🛸</div></div><div class="escape-map">`;

  passes.forEach((completed, idx) => {
    const unlocked = idx === 0 || passes[idx-1];
    const status = completed ? 'completed' : unlocked ? 'unlocked' : 'locked';
    html += `
      <div class="pass-node ${status}" data-pass="${idx}">
        <div class="pass-icon">${completed ? '🌟' : unlocked ? '🔓' : '🔒'}</div>
        <div class="pass-title">PASS ${idx+1}</div>
        <div class="spaceship">🛸</div>
        <div style="font-size:0.78rem;color:var(--muted);">${room==='all' ? 10 : 15} words</div>
      </div>`;
  });
  html += `</div>`;
  area.innerHTML = html;

  document.querySelectorAll('.pass-node').forEach(node => {
    node.onclick = () => {
      const p = parseInt(node.dataset.pass);
      if (passes[p]) return alert("Already cleared!");
      if (p === 0 || passes[p-1]) startEscapePass(room, p);
      else alert("Clear previous pass first!");
    };
  });
}

async function startEscapePass(room, passIdx) {
  escapeActive = true;
  currentRoom = room;
  currentPass = passIdx;
  const bank = await buildEscapeBank(room);
  const perPass = room === 'all' ? 10 : 15;
  passWords = bank.slice(passIdx * perPass, (passIdx + 1) * perPass);
  passCorrect = 0;
  currentIndex = 0;
  renderEscapeQuiz();
}

function renderEscapeQuiz() {
  const w = passWords[currentIndex];
  const area = document.getElementById('monsterGameDynamicArea');
  area.innerHTML = `
    <div class="stats-panel"><div class="score-box">PASS ${currentPass+1} • ${passCorrect}/${currentIndex+1}</div><div class="timer-ring" id="escapeTimer">⏱ 5s</div></div>
    <div class="quiz-arena"><div class="word-display">${w.Word}</div><div class="pos-badge">${w.POS} • ${refTag(w)}</div></div>
    <div class="options-grid" id="escapeOptions"></div>
  `;

  speak(w.Word);

  let opts = [w.Meaning];
  const others = passWords.filter((_,i)=>i!==currentIndex).map(x=>x.Meaning).sort(()=>0.5-Math.random());
  for (let o of others) if (!opts.includes(o) && opts.length<4) opts.push(o);
  opts.sort(()=>0.5-Math.random());

  const grid = document.getElementById('escapeOptions');
  opts.forEach((opt,i) => {
    const btn = document.createElement('div');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="prefix">${String.fromCharCode(65+i)}</span><span>${opt}</span>`;
    btn.onclick = () => handleEscapeAnswer(opt, w.Meaning);
    grid.appendChild(btn);
  });

  startEscapeTimer();
}

function startEscapeTimer() {
  let time = 5;
  const el = document.getElementById('escapeTimer');
  if (escapeTimerInterval) clearInterval(escapeTimerInterval);
  escapeTimerInterval = setInterval(() => {
    time--;
    el.textContent = `⏱ ${time}s`;
    if (time <= 0) {
      clearInterval(escapeTimerInterval);
      endJourney();
    }
  }, 1000);
}

function handleEscapeAnswer(selected, correct) {
  clearInterval(escapeTimerInterval);
  const isCorrect = selected === correct;

  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.style.pointerEvents = 'none';
    const text = btn.textContent.replace(/^[A-D]/,'').trim();
    if (text === correct) btn.classList.add('correct-highlight');
    if (text === selected && !isCorrect) btn.classList.add('wrong-highlight');
  });

  if (isCorrect) {
    passCorrect++;
    currentIndex++;
    if (currentIndex < passWords.length) setTimeout(renderEscapeQuiz, 700);
    else completePass();
  } else {
    endJourney();
  }
}

function completePass() {
  escapeActive = false;
  saveProgress(currentRoom, currentPass);
  const area = document.getElementById('monsterGameDynamicArea');
  area.innerHTML = `
    <div style="text-align:center;padding:60px 20px;">
      <div style="font-size:5rem;">🛸</div>
      <h2 style="color:#4ade80;">PASS CLEARED!</h2>
      <button class="btn-monster" id="nextPassBtn">CONTINUE JOURNEY →</button>
      <button class="btn btn-ghost" id="mapBtn">RETURN TO MAP</button>
    </div>
  `;
  document.getElementById('nextPassBtn').onclick = () => {
    if (currentPass + 1 < escapeProgress[currentRoom].length) startEscapePass(currentRoom, currentPass + 1);
    else { alert("🎉 YOU HAVE ESCAPED THE NEBULA SECTOR!"); closeMonsterGame(); }
  };
  document.getElementById('mapBtn').onclick = closeMonsterGame;
}

function endJourney() {
  escapeActive = false;
  clearInterval(escapeTimerInterval);
  const area = document.getElementById('monsterGameDynamicArea');
  area.innerHTML = `
    <div style="text-align:center;padding:60px 20px;color:#f87171;">
      <div style="font-size:5rem;">💥</div>
      <h2>MISSION FAILED</h2>
      <p>The nebula consumed your ship...</p>
      <button class="btn-monster" onclick="closeMonsterGame()">RETURN TO BASE</button>
    </div>
  `;
}

function showEscapeRoomSelector() {
  const area = document.getElementById('monsterGameDynamicArea') || document.body;
  area.innerHTML = `
    <div style="text-align:center;padding:40px 20px;">
      <h1 style="color:var(--gold2);font-size:2.4rem;">🌌 INTERGALACTIC ESCAPE ROOM</h1>
      <div class="level-racer" id="sectorSelector"></div>
      <button class="btn-monster" id="startEscapeBtn" style="margin-top:30px;">BEGIN TRANSMISSION</button>
    </div>
  `;
  const sel = document.getElementById('sectorSelector');
  [1,2,3,4,5,6].forEach(l => {
    const d = document.createElement('div'); d.className = 'lv-badge'; d.textContent = `SECTOR ${l}`; d.dataset.room = l; sel.appendChild(d);
  });
  const all = document.createElement('div'); all.className = 'lv-badge'; all.textContent = '🌌 THE LABYRINTH'; all.dataset.room = 'all'; sel.appendChild(all);

  sel.querySelectorAll('.lv-badge').forEach(el => {
    el.onclick = () => {
      sel.querySelectorAll('.lv-badge').forEach(e => e.classList.remove('selected-lv'));
      el.classList.add('selected-lv');
      currentRoom = el.dataset.room;
    };
  });

  document.getElementById('startEscapeBtn').onclick = () => showEscapeMap(currentRoom || 'all');
}

function openMonsterGame() {
  if (document.getElementById('monsterOverlay')) return;
  const overlay = document.createElement('div');
  overlay.id = 'monsterOverlay';
  overlay.className = 'monster-game-overlay';
  overlay.innerHTML = `
    <div class="monster-game-container">
      <div class="back-to-main" id="closeMonsterOverlay">← RETURN TO ORBIT</div>
      <div class="monster-card">
        <div class="monster-header"><h1><span>🛸</span> INTERGALACTIC ESCAPE <span>🌌</span></h1></div>
        <div class="game-body"><div id="monsterGameDynamicArea"></div></div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('closeMonsterOverlay').onclick = closeMonsterGame;
  showEscapeRoomSelector();
}

function closeMonsterGame() {
  const ov = document.getElementById('monsterOverlay');
  if (ov) {
    escapeActive = false;
    if (escapeTimerInterval) clearInterval(escapeTimerInterval);
    ov.remove();
  }
}

document.getElementById('monsterEntranceBtn').onclick = openMonsterGame;

console.log('✅ Full working version loaded with localStorage only!');
</script>
</body>
</html>
